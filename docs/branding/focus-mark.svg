<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B2036"/>
      <stop offset="1" stop-color="#11131F"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC23D"/>
      <stop offset="1" stop-color="#FF6A45"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF8A3D" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FF8A3D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#tile)"/>
  <rect x="1" y="1" width="254" height="254" rx="55" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- glow behind the focused component -->
  <circle cx="188" cy="188" r="76" fill="url(#glow)"/>

  <!-- parent frame: the structured canvas, corner open where the child left -->
  <path d="M144 104 L144 60 Q144 40 124 40 L60 40 Q40 40 40 60 L40 124 Q40 144 60 144 L104 144"
        fill="none" stroke="#4D5577" stroke-width="8" stroke-linecap="round"/>

  <!-- sibling components, dimmed, still docked -->
  <rect x="56" y="56" width="32" height="32" rx="8" fill="#3A4160" opacity="0.85"/>
  <rect x="96" y="56" width="32" height="32" rx="8" fill="#3A4160" opacity="0.85"/>
  <rect x="56" y="96" width="32" height="32" rx="8" fill="#3A4160" opacity="0.85"/>
  <!-- fourth slot is empty: that component is out, in focus -->

  <!-- extraction trail through the open corner (attention ramping up) -->
  <circle cx="112" cy="112" r="2.5" fill="#FFA53D" opacity="0.3"/>
  <circle cx="122" cy="122" r="3.5" fill="#FFA53D" opacity="0.55"/>
  <circle cx="131" cy="131" r="4.5" fill="#FFA53D" opacity="0.85"/>

  <!-- the focused component -->
  <rect x="152" y="152" width="64" height="64" rx="14" fill="url(#hot)"/>

  <!-- focus brackets -->
  <g fill="none" stroke="#F2EFE6" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M136 158 L136 148 Q136 136 148 136 L158 136"/>
    <path d="M210 136 L220 136 Q232 136 232 148 L232 158"/>
    <path d="M232 210 L232 220 Q232 232 220 232 L210 232"/>
    <path d="M158 232 L148 232 Q136 232 136 220 L136 210"/>
  </g>
</svg>
